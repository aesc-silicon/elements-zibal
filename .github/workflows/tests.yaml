# This workflow runs all zibal test cases

name: Zibal Tests

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: zibal

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup SBT
        run: |
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | sudo apt-key add
          sudo apt-get update
          sudo apt-get install -y sbt

      - name: Cache SBT
        uses: actions/cache@v3
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt') }}

      - name: Checkout VexRiscv
        uses: actions/checkout@v6
        with:
          repository: aesc-silicon/elements-vexriscv
          path: vexriscv

      - name: Checkout Nafarr
        uses: actions/checkout@v6
        with:
          repository: aesc-silicon/elements-nafarr
          ref: main
          path: nafarr

      - name: Checkout SpinalCrypto
        uses: actions/checkout@v6
        with:
          repository: SpinalHDL/SpinalCrypto
          ref: master
          path: SpinalCrypto

      - name: Checkout VexiiRiscv
        uses: actions/checkout@v6
        with:
          repository: SpinalHDL/VexiiRiscv
          ref: dev
          path: VexiiRiscv
          submodules: true

      - name: Publish VexiiRiscv
        run: |
          cd VexiiRiscv
          sbt publishLocal

      - name: Compile
        run: |
          cd zibal
          sbt compile
